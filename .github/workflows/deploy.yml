name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options: [dev, staging, prod]
      dry_run:
        description: "Dry run — build & test only, skip deploy"
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  AWS_REGION: ap-southeast-2
  TOFU_VERSION: 1.8.8

permissions:
  id-token: write
  contents: read

jobs:
  # ════════════════════════════════════════════════════════════
  # 1. Build — Rust lambdas + frontend
  # ════════════════════════════════════════════════════════════
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Rust ───────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: deploy

      - name: Install cargo-lambda
        run: pip3 install cargo-lambda

      - name: Build lambdas
        run: |
          cargo lambda build --release -p api
          cargo lambda build --release -p etl-trigger
          cargo lambda build --release -p authorizer

      - name: Upload lambda artefacts
        if: ${{ !inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: lambda-binaries
          path: target/lambda/
          retention-days: 1

      # ── Frontend ───────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: onboard-you-frontend/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: onboard-you-frontend

      - name: Build frontend
        run: pnpm build
        working-directory: onboard-you-frontend

      - name: Upload frontend artefacts
        if: ${{ !inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: |
            onboard-you-frontend/packages/platform/dist/
            onboard-you-frontend/packages/config/dist/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # 2. Unit tests — backend & frontend in parallel
  # ════════════════════════════════════════════════════════════
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: deploy

      - name: Unit tests
        run: cargo test --release --workspace --lib

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: onboard-you-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: onboard-you-frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

  # ════════════════════════════════════════════════════════════
  # 3. Deploy infrastructure (lambdas + infra)
  #    Skipped on dry run
  # ════════════════════════════════════════════════════════════
  deploy-infra:
    name: Deploy Infrastructure
    if: ${{ !inputs.dry_run }}
    needs: [build, test-backend, test-frontend]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      api_url: ${{ steps.outputs.outputs.api_url }}
      frontend_bucket: ${{ steps.outputs.outputs.frontend_bucket }}
      cloudfront_id: ${{ steps.outputs.outputs.cloudfront_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Download lambda artefacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-binaries
          path: target/lambda/

      - name: Tofu init
        run: tofu init -input=false
        working-directory: infra

      - name: Tofu apply
        run: tofu apply -auto-approve -input=false
        working-directory: infra

      - name: Export outputs
        id: outputs
        working-directory: infra
        run: |
          echo "api_url=$(tofu output -raw api_url)" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket=$(tofu output -raw frontend_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_id=$(tofu output -raw frontend_cloudfront_id)" >> "$GITHUB_OUTPUT"

  # ════════════════════════════════════════════════════════════
  # 4. Smoke tests — hit the live API
  #    Skipped on dry run
  # ════════════════════════════════════════════════════════════
  smoke-test:
    name: Smoke Tests
    if: ${{ !inputs.dry_run }}
    needs: [deploy-infra]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test/smoke-test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: test/smoke-test/pnpm-lock.yaml

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write .env from deploy outputs
        run: |
          cd "$GITHUB_WORKSPACE/infra"
          tofu init -input=false > /dev/null
          cd "$GITHUB_WORKSPACE/test/smoke-test"
          bash ./sync-env.sh

      - name: Run smoke tests
        run: pnpm test

  # ════════════════════════════════════════════════════════════
  # 5. Deploy frontend — S3 sync + CloudFront invalidation
  #    Skipped on dry run
  # ════════════════════════════════════════════════════════════
  deploy-frontend:
    name: Deploy Frontend
    if: ${{ !inputs.dry_run }}
    needs: [deploy-infra, smoke-test]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download frontend artefacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist/

      - name: Sync to S3
        run: |
          aws s3 sync frontend-dist/onboard-you-frontend/packages/platform/dist/ \
            s3://${{ needs.deploy-infra.outputs.frontend_bucket }}/ \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.deploy-infra.outputs.cloudfront_id }} \
            --paths "/*"

      - name: Summary
        run: |
          echo "### ✅ Deployment complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **API** | ${{ needs.deploy-infra.outputs.api_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Frontend** | https://${{ needs.deploy-infra.outputs.cloudfront_id }}.cloudfront.net |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Environment** | ${{ inputs.environment }} |" >> "$GITHUB_STEP_SUMMARY"
